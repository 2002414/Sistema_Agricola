services:
  web:
    build: .
    container_name: sistema_agricola_web

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - .:/var/www/html
      - /etc/letsencrypt:/etc/letsencrypt:ro

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    container_name: sistema_agricola_db

    environment:
      POSTGRES_DB: Sistema_Agricola
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 33016690

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
